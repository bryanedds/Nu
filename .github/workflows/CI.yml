name: CI
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        # Supported platforms: https://docs.github.com/en/actions/reference/runners/github-hosted-runners
        os:
          - windows-latest
          - windows-11-arm
          - ubuntu-24.04-arm
          - ubuntu-latest
          - macos-26 # choose a macOS version with Xcode that is supported by https://github.com/dotnet/macios/releases
      fail-fast: false # Don't cancel one when another fails
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
      - uses: Happypig375/install-vulkan-sdk-action@main # move to jakoch/install-vulkan-sdk-action@v1 once https://github.com/jakoch/install-vulkan-sdk-action/pull/587 is released
        if: contains(matrix.os, 'macos')
        with:
          optional_components: com.lunarg.vulkan.ios
      - name: Build desktop only
        run: dotnet build
      - name: Install MAUI workload (if not Linux ARM)
        if: "!(contains(matrix.os, 'ubuntu') && contains(matrix.os, 'arm'))" # .NET Android SDK doesn't support Linux ARM64: https://github.com/dotnet/android/issues/11184
        run: |
          dotnet workload install ${{ case(!contains(matrix.os, 'ubuntu'), 'maui', 'maui-android') }} # Linux doesn't support iOS therefore full MAUI workload
      - name: Install Android dependencies for Windows ARM
        if: "contains(matrix.os, 'windows') && contains(matrix.os, 'arm')"
        run:
          dotnet build "Projects/Sand Box 2d" -t:InstallAndroidDependencies -f net10.0-android -p BuildMobile=true,AcceptAndroidSdkLicenses=True
      - name: Get Xcode version from iOS workload
        id: ios-version
        if: contains(matrix.os, 'macos')
        run: |
          # Apple has synchronized version numbers across iOS, macOS, and Xcode,
          # and the .NET iOS workload version matches this scheme: the iOS workload
          # version e.g. 26.5.10284 → iOS 26.5 → Xcode 26.5.
          # (https://github.com/dotnet/macios/issues/25818#issuecomment-4799784136)
          # We derive the Xcode version from the installed iOS workload manifest:
          #   1. Compute the SDK feature band from `dotnet --version` (round patch
          #      down to nearest 100, e.g. 10.0.102 → 10.0.100).
          #   2. List version directories under `microsoft.net.sdk.ios/` — each dir
          #      name IS a workload version (e.g. 26.5.10284).
          #   3. Sort version-sorted, take the latest, and extract major.minor.
          # NOTE: actions/setup-dotnet may set $DOTNET_ROOT to $HOME/.dotnet while
          # the system SDK lives at /usr/local/share/dotnet, and workload manifests
          # can be installed to either location. We search all possible dotnet roots.
          echo "::group::Resolve Xcode version from iOS workload"
          SDK_BAND=$(dotnet --version | awk -F. '{print $1"."$2"."int($3/100)*100}')
          echo "dotnet version: $(dotnet --version)"
          echo "SDK band: $SDK_BAND"
          echo "DOTNET_ROOT: '$DOTNET_ROOT'"
          echo "HOME/.dotnet exists: $(test -d "$HOME/.dotnet" && echo yes || echo no)"
          echo "Searching for iOS workload manifests..."
          IOS_VERSION=
          for _root in "$DOTNET_ROOT" "$HOME/.dotnet" "/usr/local/share/dotnet" "/usr/share/dotnet"; do
            [ -n "$_root" ] || { echo "  skip empty root"; continue; }
            _manifest_dir="$_root/sdk-manifests/$SDK_BAND/microsoft.net.sdk.ios"
            if [ -d "$_manifest_dir" ]; then
              echo "  found at $_manifest_dir"
              _versions=$(ls "$_manifest_dir/" 2>/dev/null)
              echo "  versions: $_versions"
              IOS_VERSION=$(echo "$_versions" \
                | sort -t. -k1,1n -k2,2n -k3,3n | tail -1 | cut -d. -f1-2)
              echo "  latest: $IOS_VERSION"
              [ -n "$IOS_VERSION" ] && break
            else
              echo "  not at $_manifest_dir"
            fi
          done
          echo "Resolved Xcode version: ${IOS_VERSION:-latest-stable}"
          echo "xcode-version=${IOS_VERSION:-latest-stable}" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
      - uses: maxim-lobanov/setup-xcode@v1
        if: contains(matrix.os, 'macos')
        with:
          xcode-version: ${{ steps.ios-version.outputs.xcode-version }}
      - name: Build all (if not Linux ARM)
        if: "!(contains(matrix.os, 'ubuntu') && contains(matrix.os, 'arm'))"
        run: dotnet build -p BuildMobile=true
  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest] # can't include ARM because we don't have ImGui native libraries
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
      - uses: jakoch/install-vulkan-sdk-action@v1
        if: contains(matrix.os, 'macos')
        # GitHub Actions runners have no GPU so skip Integration tests
      - run: dotnet test Nu/Nu.Tests --filter TestCategory!="Integration"
