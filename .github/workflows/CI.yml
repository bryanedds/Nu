name: CI
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        # Supported platforms: https://docs.github.com/en/actions/reference/runners/github-hosted-runners
        os:
          - windows-latest
          - windows-11-arm
          - ubuntu-24.04-arm
          - ubuntu-latest
          - macos-latest
      fail-fast: false # Don't cancel one when another fails
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
      - uses: jakoch/install-vulkan-sdk-action@v1
        if: contains(matrix.os, 'macos')
        with:
          optional_components: 'com.lunarg.vulkan.ios'
      - name: Build desktop only
        run: dotnet build -p TargetFrameworks=net10.0
      - name: Install Android dependencies
        run: |
          dotnet workload install ${{ case(!contains(matrix.os, 'ubuntu'), 'maui', 'maui-android') }}
          dotnet build "Projects/Sand Box 2d" -t:InstallAndroidDependencies -f net10.0-android -p:AcceptAndroidSdkLicenses=True ${{ case(contains(matrix.os, 'ubuntu') && contains(matrix.os, 'arm'), '-p:AndroidSdkDirectory=/usr/local/lib/android/sdk', '') }} # path from https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md#environment-variables-2
      - name: Build all
        if: "!(contains(matrix.os, 'ubuntu') && contains(matrix.os, 'arm'))" # .NET Android SDK doesn't support Linux ARM64: https://github.com/dotnet/android/issues/11184
        run: dotnet build
  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - uses: jakoch/install-vulkan-sdk-action@v1
        if: contains(matrix.os, 'macos')
        with:
          optional_components: 'com.lunarg.vulkan.ios'
        # GitHub Actions runners have no GPU so skip Integration tests
      - run: dotnet test Nu/Nu.Tests --filter TestCategory!="Integration"
